    /* Industrial B2B visual refresh: hierarchy + breathing room, IA unchanged */
    :root{

function bindNodes(){document.querySelectorAll('.node').forEach(n=>n.onclick=()=>{document.querySelectorAll('.node').forEach(x=>x.classList.remove('active'));n.classList.add('active');activeNode=n.dataset.node;document.getElementById('nodeNameInput').value=activeNode;toast('已选中：'+activeNode);});}
function sendDebug(){const input=document.getElementById('debugInput');const val=input.value.trim();if(!val)return;const body=document.getElementById('chatBody');body.insertAdjacentHTML('beforeend',`<div class="bubble-row user"><div class="bubble user"><div>${escapeHtml(val)}</div><div class="bubble-meta"><span>ASR final</span><span>置信度 0.94</span></div></div><div class="avatar-mini">用</div></div><div class="bubble-row"><div class="avatar-mini">AI</div><div class="bubble"><span class="badge">大模型触发</span><div style="margin-top:8px">我先按预约咨询帮您确认渠道。</div><div class="bubble-tools"><span class="badge">主题：预约咨询</span><span class="badge gray">实体抽取 176ms</span><span class="badge">知识召回</span></div><div class="bubble-meta"><span>首响 380ms</span><span>总耗时 980ms</span><button class="btn small" onclick="openLogModal('turn_dynamic')">查看日志</button></div></div></div>`);input.value='';body.scrollTop=body.scrollHeight;}

    '转人工':`<div class="turn-divider">场景：转人工 · 检查转人工触发与播报</div><div class="bubble-row user"><div class="bubble user"><div>你们一直解决不了，帮我转人工。</div><div class="bubble-meta"><span>ASR final</span><span>情绪：抱怨</span></div></div><div class="avatar-mini">用</div></div><div class="bubble-row"><div class="avatar-mini">AI</div><div class="bubble"><span class="badge amber">转人工触发</span><div style="margin-top:8px">好的，我帮您转接人工客服。</div><div class="bubble-tools"><span class="badge">原因：用户明确要求</span><span class="badge gray">工具：transfer_agent</span></div><div class="bubble-meta"><span>首响 160ms</span><button class="btn small" onclick="openLogModal('turn_transfer')">查看日志</button></div></div></div>`,

    '工具调用':`<div class="turn-divider">场景：工具调用 · 检查工具入参、返回和清洗结果</div><div class="bubble-row user"><div class="bubble user"><div>帮我查一下我这个手机号有没有订单。</div><div class="bubble-meta"><span>ASR final</span><span>命中实体：手机号=当前外呼号码</span></div></div><div class="avatar-mini">用</div></div><div class="bubble-row"><div class="avatar-mini">AI</div><div class="bubble"><span class="badge green">工具调用</span><div style="margin-top:8px">我查到您有一笔待预约订单，可以在订单详情里选择时间。</div><div class="bubble-tools"><span class="badge">工具：query_order</span><span class="badge gray">返回清洗成功</span><span class="badge gray">耗时 236ms</span></div><div class="bubble-meta"><span>总耗时 980ms</span><button class="btn small" onclick="openLogModal('turn_tool')">查看日志</button></div></div></div>`
